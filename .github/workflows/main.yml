name: 52-Hour Discord Ping

on:
  schedule:
    - cron: '0 * * * *' # Checks every hour
  workflow_dispatch: # Allows manual testing

permissions:
  contents: write # Grants permission to update last_ping.txt

jobs:
  check-and-ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run check script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ROLE_ID: ${{ secrets.ROLE_ID }}
        run: python check_time.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add last_ping.txt
          # The '|| true' ensures the workflow doesn't fail if there's nothing to update
          git commit -m "Update last ping timestamp" || true
          git push
